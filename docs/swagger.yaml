  /api/v1/records/update:
    post:
      consumes:
      - application/json
      description: 更新一条亲密记录，只传需要修改的字段。标签和姿势列表为全量替换，传空数组表示清除所有关联。
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 要更新的内容（需包含 id 字段）
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.UpdateRecordInput'
