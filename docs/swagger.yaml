      responses:
        "200":
          description: 记录详情
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Record'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 记录不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
