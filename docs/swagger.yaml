      - application/json
      responses:
        "200":
          description: 更新后的记录
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Record'
              type: object
        "400":
          description: 参数错误或记录不存在
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 更新记录
      tags:
      - 记录
  /api/v1/user/password/change:
    post:
      consumes:
      - application/json
      description: 修改当前登录用户的密码，需要提供旧密码验证身份。修改成功后所有设备强制下线
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 旧密码和新密码
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.ChangePasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: 修改成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 参数错误或旧密码不正确
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 修改密码
      tags:
      - 用户
  /api/v1/user/profile/get:
    post:
      description: 获取当前登录用户的详细信息，包括昵称、头像、生日等
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 用户信息
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.User'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 获取个人信息
      tags:
      - 用户
  /api/v1/user/profile/update:
    post:
      consumes:
      - application/json
      description: 更新当前登录用户的昵称、头像、生日等，只传需要修改的字段
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 要更新的字段
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.UpdateProfileInput'
      produces:
      - application/json
      responses:
        "200":
          description: 更新后的用户信息
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.User'
              type: object
        "400":
          description: 参数格式错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 更新个人信息
      tags:
      - 用户
securityDefinitions:
  BearerAuth:
    description: 登录后将 access_token 填入此处，格式：Bearer <token>
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
